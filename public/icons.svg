<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2C2C2E"/>
      <stop offset="100%" stop-color="#1C1C1E"/>
    </linearGradient>
    <linearGradient id="gt0" x1="180" y1="180" x2="180" y2="490" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="gt1" x1="534" y1="180" x2="534" y2="490" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="gt2" x1="180" y1="534" x2="180" y2="844" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="gt3" x1="534" y1="534" x2="534" y2="844" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#2E1065"/>
    </linearGradient>
    <linearGradient id="gbolt" x1="430" y1="195" x2="285" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#DDD6FE"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
  </defs>

  <!-- 1. Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#gbg)"/>

  <!-- 2. Tiles 70% opacity -->
  <rect x="180" y="180" width="310" height="310" rx="48" ry="48" fill="url(#gt0)" opacity="0.70"/>
  <rect x="534" y="180" width="310" height="310" rx="48" ry="48" fill="url(#gt1)" opacity="0.70"/>
  <rect x="180" y="534" width="310" height="310" rx="48" ry="48" fill="url(#gt2)" opacity="0.70"/>
  <rect x="534" y="534" width="310" height="310" rx="48" ry="48" fill="url(#gt3)" opacity="0.70"/>

  <!-- 3. Drop shadow -->
  <polygon points="436,203 361,443 421,443 291,828 586,478 516,478 651,203" fill="#1E0A4E" opacity="0.25"/>

  <!-- 4. Bolt body -->
  <polygon points="430,195 355,435 415,435 285,820 580,470 510,470 645,195" fill="url(#gbolt)"/>

  <!-- 5. Left bright face -->
  <polygon points="430,195 355,435 415,435" fill="#EDE9FE" opacity="0.80"/>

  <!-- 6. Right shadow face -->
  <polygon points="615,195 645,195 510,470 480,470" fill="#2E1065" opacity="0.85"/>

  <!-- 7. Highlight line -->
  <polyline points="645,195 430,195 355,435" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>
</svg>